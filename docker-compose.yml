# FitMirror — full stack via Docker Compose
# Services:
#   - app       : Next.js (port 3000)
#   - pocketbase : PocketBase backend + admin UI (port 8090)
#
# Usage:
#   docker compose up --build
#
# Then:
#   - App:          http://localhost:3000
#   - PocketBase:   http://localhost:8090/_/  (admin login below)
#
# First-time PocketBase setup (run once after `up`):
#   docker compose exec pocketbase /pocketbase/pocketbase superuser upsert admin@fitmirror.local 'fitmirror-admin-2024'
#   docker compose exec app node mini-services/pocketbase/setup.mjs

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND=pocketbase
      - DATABASE_URL=file:/app/db/custom.db
      - NODE_ENV=production
      - PORT=3000
      # PocketBase
      - POCKETBASE_URL=http://pocketbase:8090
      - POCKETBASE_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@fitmirror.local}
      - POCKETBASE_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-fitmirror-admin-2024}
      # Dodo Payments (optional — add your keys here or via Admin UI)
      - DODO_API_KEY=${DODO_API_KEY:-}
      - DODO_WEBHOOK_SECRET=${DODO_WEBHOOK_SECRET:-}
    volumes:
      - app-db:/app/db
      - app-uploads:/app/public/uploads
    depends_on:
      - pocketbase
    restart: unless-stopped

  pocketbase:
    build:
      context: ./mini-services/pocketbase
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - pb-data:/pb_data
      - ./mini-services/pocketbase/setup.mjs:/setup.mjs:ro
    restart: unless-stopped

volumes:
  app-db:
  app-uploads:
  pb-data:
